spring.application.name=project-e-commerce

# Cookies / redirections corrects quand le front Vite proxifie en HTTPS (X-Forwarded-Proto).
server.forward-headers-strategy=framework

# DevTools : le redémarrage à chaud utilise un classloader séparé ; avec Eclipse et un output partiel (target/classes
# incomplet), cela peut provoquer ClassNotFoundException (ex. PaymentService). false = classloader classique, plus fiable.
# Pour réactiver le restart automatique : SPRING_DEVTOOLS_RESTART=true
spring.devtools.restart.enabled=${SPRING_DEVTOOLS_RESTART:false}

# Négociation : réduction minimum exigée par rapport au prix affiché (0 = désactivé, ex. 5 = offre max = 95 % du prix catalogue).
app.negotiation.buyer-min-reduction-percent=${NEGOTIATION_MIN_REDUCTION_PERCENT:0}

# Session HTTP (~24h d'inactivité, aligné cahier des charges)
server.servlet.session.timeout=24h
server.servlet.session.tracking-modes=cookie
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.path=/
server.servlet.session.cookie.http-only=true
# Lax : cookie envoyé en fetch cross-port localhost (5173 → 8080). En prod HTTPS, ajuster si besoin.
server.servlet.session.cookie.same-site=lax

# Inscription : pièce d'identité jusqu'à 5 Mo côté métier — limites Spring > max pour éviter ERR_CONNECTION_RESET
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
spring.servlet.multipart.file-size-threshold=1MB
spring.servlet.multipart.resolve-lazily=false

# Mot de passe initial des comptes super-admin bootstrap (à changer en prod)
app.security.bootstrap-super-admin-password=${BOOTSTRAP_SUPER_ADMIN_PASSWORD:ChangeMe!2026}
# Compte démo livreur (livreur@demo.ecom) — à changer en prod
app.security.bootstrap-livreur-password=${BOOTSTRAP_LIVREUR_PASSWORD:ChangeMeLivreur!2026}

# Phrase secrète pour AES-256 (références de paiement chiffrées en base). Définir APP_CRYPTO_AES_SECRET en prod.
app.crypto.aes-secret=${APP_CRYPTO_AES_SECRET:EcomarketDevPassphrase_ChangeInProduction_32b!}

spring.datasource.url=jdbc:mysql://localhost:3306/projetecommerce?useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA/Hibernate pour mySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
server.address=0.0.0.0
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JSON : dates en ISO-8601 (plus lisible pour le front)
spring.jackson.serialization.write-dates-as-timestamps=false

# Swagger UI : http://localhost:<port>/swagger-ui.html  (OpenAPI JSON : /v3/api-docs)
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.api-docs.path=/v3/api-docs

# Sécurité HTTP : false = Swagger + OpenAPI réservés aux utilisateurs connectés (recommandé en prod)
app.security.swagger-open=true

# --- E-mail (mot de passe oublié / réinitialisation) ---
# Brevo (gratuit jusqu’à un quota mensuel) : compte sur https://www.brevo.com — SMTP & API → générer une clé SMTP.
#   MAIL_HOST=smtp-relay.brevo.com  MAIL_PORT=587  MAIL_USERNAME=<votre e-mail Brevo>  MAIL_PASSWORD=<clé SMTP>
#   MAIL_FROM=<expéditeur vérifié dans Brevo>  (souvent identique à MAIL_USERNAME)
# Gmail : validation en 2 étapes + mot de passe d’application. Outlook : smtp.office365.com, port 587.
# Port 465 (SSL implicite) : MAIL_PORT=465 et MAIL_SMTP_SSL=true (désactiver STARTTLS si le fournisseur l’exige).
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL:false}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:*}
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.default-encoding=UTF-8

# Expéditeur (souvent identique à spring.mail.username pour Gmail)
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.mail.from-personal=${MAIL_FROM_PERSONAL:Ecomarket}
# false = pas d'envoi réel (dev) ; le lien de reset est écrit dans les logs WARN
app.mail.enabled=${MAIL_ENABLED:true}

# URL de la page front qui lit le paramètre ?token=... (sans slash final)
app.mail.password-reset.frontend-base-url=${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}
app.mail.password-reset.token-validity-minutes=${PASSWORD_RESET_TOKEN_MINUTES:60}

# --- PayDunya (BF / UEMOA) : https://developers.paydunya.com — créer une app « Integration » sur paydunya.com
# En dev sans clés : les endpoints PayDunya renvoient une erreur explicite jusqu’à configuration.
app.paydunya.master-key=${PAYDUNYA_MASTER_KEY:}
app.paydunya.private-key=${PAYDUNYA_PRIVATE_KEY:}
app.paydunya.token=${PAYDUNYA_TOKEN:}
app.paydunya.sandbox=${PAYDUNYA_SANDBOX:true}
app.paydunya.store-name=${PAYDUNYA_STORE_NAME:Ecomarket}
# Page front après paiement (?token=… ajouté par PayDunya)
app.paydunya.frontend-return-base-url=${PAYDUNYA_FRONTEND_RETURN_URL:http://localhost:5173/paiement/paydunya}
# URL publique du backend (callback IPN)
app.paydunya.backend-public-base-url=${PAYDUNYA_BACKEND_PUBLIC_URL:http://localhost:8080}