# Contexte de test : H2 en mémoire (pas besoin de MySQL pour mvn test)
spring.datasource.url=jdbc:h2:mem:ecomarket_test;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER,ROLE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

app.security.bootstrap-super-admin-password=TestBootstrapPwd!
app.security.bootstrap-livreur-password=TestLivreurPwd!
app.crypto.aes-secret=EcomarketDevPassphrase_ChangeInProduction_32b!

spring.mail.host=127.0.0.1
spring.mail.port=3025
# GreenMail (sans auth) : laisser identifiants vides pour qu’Angus Mail n’essaie pas LOGIN/PLAIN.
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
app.mail.from=test@example.org
app.mail.password-reset.frontend-base-url=http://localhost:5173/reset-password
