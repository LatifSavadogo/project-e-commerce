<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Autorise l’usage de la caméra pour le scan QR (même origine). -->
    <meta http-equiv="Permissions-Policy" content="camera=(self)" />
    <title>react-ecommerce</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('ecomarket-theme')
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t)
            document.documentElement.style.colorScheme = t === 'light' ? 'light' : 'dark'
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
